<!doctype html>
<html lang="en">

  <head>

    <meta charset="utf-8">
    <title>website horizontal drop-down submenus with alternating of target</title>

    <!--  author, in full extend of this work: www.github.com/access-excess  -->
    <!--		   first published: 17th July 2022		     -->
    <!--	     license: https://spdx.org/licenses/MIT.html	     -->

    <base href="D:/hdsat/">
    <link rel="stylesheet" type="text/css" href="hdsat.css">
    <script type="text/javascript" src="hdsat.js"></script>

  </head>

  <body>

    <table id="main">
      <tr>
	<td>
	  <div id="m1"; title="inactive">
	    m1
	  </div>
	</td>
	<td>
	  <div id="m2"; class="hand, pointer"; onclick="ClickM2('M2ExpDiv', 'M2S13ExpDiv', 'M2S13S21Exp', 'M2S13S22Exp')">
	    M2
	  </div>
	</td>
	<td>
	  <div id="m3"; title="inactive">
	    m3
	  </div>
	</td>
	<td>
	  <div id="m4"; title="inactive">
	    m4
	  </div>
	</td>
      </tr>
    </table>

    <table id="sub1">
      <tr>
	<td>
	</td>
	<td>
	  <div id="M2ExpDiv"; style="display:none">
	    <table id="M2ExpTab">
	      <tr>
	      <td>
	  	<div id="M2s11"; title="inactive">
		  M2-s11
		</div>
	      </td>
	      <td>
	  	<div id="M2s12"; title="inactive">
		  M2-s12
		</div>
	      </td>
	      <td>
	  	<div id="M2S13"; class="hand, pointer"; onclick="ClickM2S13('M2S13ExpDiv', 'M2S13S21Exp', 'M2S13S22Exp')">
		  M2-S13
		</div>
	      </td>
	      </tr>
	    </table>
	  </div>
	</td>
	<td>
	</td>
	<td>
	</td>
      </tr>
    </table>

    <table id="sub2">
      <tr>
	<td>
	</td>
	<td>
	  <div id="M2S13ExpDiv"; class="hand, pointer"; style="display:none">
	    <table id="M2S13ExpTab">
	      <tr>
	      <td>
	  	<div id="M2S13S21"; onclick="ClickM2S13S21('M2S13S21Exp', 'M2S13S22Exp')">
		  M2-S13-S21
		</div>
	      </td>
	      <td>
	  	<div id="M2S13S22"; onclick="ClickM2S13S22('M2S13S21Exp', 'M2S13S22Exp')">
		  M2-S13-S22
		</div>
	      </td>
	      </tr>
	    </table>
	  </div>
	</td>
	<td>
	</td>
	<td>
	</td>
      </tr>
    </table>

    <!-- Alt buttons must be shown / hidden together with their targets when clicking / unclicking a submenu / main menu button,
	 so the Alt buttons and their targets must be in COMMON div section (M2S13S21Exp) for calling by JavaScript function
	 (ClickM2 or ClickM2S13 or ClickM2S13S21) -->
    <div id="M2S13S21Exp"; style="position:relative; top:20px; display:none">
      <table class="wh100">
        <tr>
	  <!-- alternating of targets -->
	  <td style="width:10%; height:100%">
	    <center>
	      <table style="border-spacing:10px">
		<tr>
		  <td style="padding:10px; text-align:center; background-color:silver; color:white">
		    <div id="tarM2S13S21Alt1"; class="hand, pointer"; onclick="ClickTarM2S13S21Alt1('M2S13S21Alt1Div', 'M2S13S21Alt2Div')">
		      Alt 1
		    </div>
		  </td>
		</tr>
		<tr>
		  <td style="padding:10px; text-align:center; background-color:gold; color:white">
		    <div id="tarM2S13S21Alt2"; class="hand, pointer"; onclick="ClickTarM2S13S21Alt2('M2S13S21Alt1Div', 'M2S13S21Alt2Div')">
		      Alt 2
		    </div>
		  </td>
		</tr>
	      </table>
	    </center>
	  </td>
	  <!-- alternated targets -->
	  <td style="width:90%; height:750px">	<!-- target container height up down -->
	    <table class="wh100">
	      <td>
		<center>
		  <div id="M2S13S21Alt1Div"; style="display:block">
		    <!-- element for displaying a picture, replacable with a snippet doing something else -->
		    <img src="M2S13S21-Alt1.png"; alt="M2S13S21-Alt1"/>
		  </div>
		  <div id="M2S13S21Alt2Div"; style="display:none">
		    <!-- element for displaying a picture, replacable with a snippet doing something else -->
		    <img src="M2S13S21-Alt2.png"; alt="M2S13S21-Alt2"/>
		  </div>
		</center>
	      </td>
	    </table>
	  </td>
	</tr>
      </table>
    </div>

    <!-- Alt buttons must be shown / hidden together with their targets when clicking / unclicking a submenu / main menu button,
	 so the Alt buttons and their targets must be in COMMON div section (M2S13S22Exp) for calling by JavaScript function
	 (ClickM2 or ClickM2S13 or ClickM2S13S22) -->
    <div id="M2S13S22Exp"; style="position:relative; top:20px; display:none">
      <table class="wh100">
        <tr>
	  <!-- alternating of targets -->
	  <td style="width:10%; height:100%">
	    <center>
	      <table style="border-spacing:10px">
		<tr>
		  <td style="padding:10px; text-align:center; background-color:silver; color:white">
		    <div id="tarM2S13S22Alt1"; class="hand, pointer"; onclick="ClickTarM2S13S22Alt1('M2S13S22Alt1Div', 'M2S13S22Alt2Div')">
		      Alt 1
		    </div>
		  </td>
		</tr>
		<tr>
		  <td style="padding:10px; text-align:center; background-color:gold; color:white">
		    <div id="tarM2S13S22Alt2"; class="hand, pointer"; onclick="ClickTarM2S13S22Alt2('M2S13S22Alt1Div', 'M2S13S22Alt2Div')">
		      Alt 2
		    </div>
		  </td>
		</tr>
	      </table>
	    </center>
	  </td>
	  <!-- alternated targets -->
	  <td style="width:90%; height:750px">	<!-- target container height up down -->
	    <table class="wh100">
	      <td>
		<center>
		  <div id="M2S13S22Alt1Div"; style="display:block">
		    <!-- element for displaying a picture, replacable with a snippet doing something else -->
		    <img src="M2S13S22-Alt1.png"; alt="M2S13S22-Alt1"/>
		  </div>
		  <div id="M2S13S22Alt2Div"; style="display:none">
		    <!-- element for displaying a picture, replacable with a snippet doing something else -->
		    <img src="M2S13S22-Alt2.png"; alt="M2S13S22-Alt2"/>
		  </div>
		</center>
	      </td>
	    </table>
	  </td>
	</tr>
      </table>
    </div>

  </body>
	
</html>
